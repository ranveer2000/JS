<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JS Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #f7c948;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 800; font-size: 1rem; color: #0a0a0f;
  }

  .logo-text {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.45rem 1rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: all 0.15s ease;
    letter-spacing: 0.3px;
  }

  .btn-run {
    background: var(--accent);
    color: #0a0a0f;
  }
  .btn-run:hover { background: #ffd84a; transform: translateY(-1px); }
  .btn-run:active { transform: translateY(0); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-clear {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-clear:hover { color: var(--text); border-color: var(--muted); }

  .btn-copy {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-copy:hover { color: var(--accent3); border-color: var(--accent3); }

  .run-shortcut {
    font-size: 0.7rem;
    color: var(--muted);
    display: none;
  }

  @media (min-width: 600px) { .run-shortcut { display: inline; } }

  /* ── Main Layout ── */
  .workspace {
    display: flex;
    flex: 1;
    height: calc(100vh - 64px);
  }

  /* ── Editor Panel ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0;
  }

  .panel-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--muted);
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .panel-bar .filename {
    color: var(--text);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }

  .lang-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  /* CodeMirror overrides */
  .CodeMirror {
    flex: 1;
    height: 100%;
    font-family: var(--font-mono) !important;
    font-size: 14px;
    background: var(--bg) !important;
    line-height: 1.7;
  }

  .CodeMirror-scroll { padding-bottom: 2rem; }
  .CodeMirror-gutters { background: var(--bg) !important; border-right: 1px solid var(--border) !important; }
  .CodeMirror-linenumber { color: var(--muted) !important; }

  .editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .editor-wrap .CodeMirror { position: absolute; inset: 0; }

  /* ── Output Panel ── */
  .output-panel {
    width: 42%;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    flex-shrink: 0;
  }

  .output-log {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    font-size: 13.5px;
    line-height: 1.65;
  }

  .output-log::-webkit-scrollbar { width: 6px; }
  .output-log::-webkit-scrollbar-track { background: transparent; }
  .output-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .log-entry {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.2rem 0;
    border-bottom: 1px solid transparent;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateX(4px); } to { opacity: 1; } }

  .log-entry + .log-entry { border-top: 1px solid rgba(255,255,255,0.03); }

  .log-icon {
    font-size: 0.7rem;
    margin-top: 3px;
    flex-shrink: 0;
    width: 14px;
    text-align: center;
  }

  .log-text {
    flex: 1;
    min-width: 0;
    word-break: break-all;
    white-space: pre-wrap;
    color: var(--text);
  }

  .log-entry.log-error .log-text { color: var(--accent2); }
  .log-entry.log-warn .log-text  { color: var(--accent); }
  .log-entry.log-info .log-text  { color: var(--accent3); }
  .log-entry.log-system .log-text { color: var(--muted); font-style: italic; font-size: 0.8rem; }

  .log-entry.log-error { background: rgba(255,107,107,0.05); border-radius: 4px; padding: 0.3rem 0.5rem; }

  /* type coloring within values */
  .val-string { color: #c3e88d; }
  .val-number { color: #f78c6c; }
  .val-boolean { color: #c792ea; }
  .val-null    { color: var(--muted); }
  .val-object  { color: var(--accent3); }

  /* status bar */
  .status-bar {
    padding: 0.35rem 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
    gap: 0.5rem;
  }

  .status-bar .status-left { display: flex; align-items: center; gap: 0.75rem; }
  .status-bar .status-right { display: flex; align-items: center; gap: 0.75rem; }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.running { background: var(--accent); animation: pulse 0.8s infinite; }
  .status-dot.success { background: var(--accent3); }
  .status-dot.error   { background: var(--accent2); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .exec-time { color: var(--accent3); font-weight: 600; }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 0.75rem;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 2rem;
    text-align: center;
  }

  .welcome-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    filter: grayscale(0.5);
  }

  .welcome kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text);
  }

  /* Divider resize handle */
  .resize-handle {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.2s;
    position: relative;
  }
  .resize-handle:hover { background: var(--accent); }

  /* mobile stacked */
  @media (max-width: 700px) {
    .workspace { flex-direction: column; height: auto; }
    .editor-panel { border-right: none; border-bottom: 1px solid var(--border); height: 50vh; }
    .output-panel { width: 100%; height: 40vh; }
    .resize-handle { display: none; }
    .CodeMirror { height: 100% !important; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">JS</div>
    <span class="logo-text">play<span>ground</span></span>
  </a>
  <div class="header-actions">
    <button class="btn btn-copy" id="copy-btn" title="Copy code">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy
    </button>
    <button class="btn btn-clear" id="clear-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M8 6V4h8v2"/></svg>
      Clear output
    </button>
    <button class="btn btn-run" id="run-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
      Run
      <span class="run-shortcut">⌘↵</span>
    </button>
  </div>
</header>

<div class="workspace" id="workspace">

  <div class="editor-panel" id="editor-panel">
    <div class="panel-bar">
      <span class="filename"><span class="dot"></span> script.js</span>
      <span class="lang-badge">JS</span>
    </div>
    <div class="editor-wrap" id="editor-wrap">
      <textarea id="code-editor"></textarea>
    </div>
  </div>

  <div class="resize-handle" id="resize-handle"></div>

  <div class="output-panel" id="output-panel">
    <div class="panel-bar">
      <span class="filename">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--accent3)"><path d="M4 17L10 11 4 5"/><path d="M12 19h8"/></svg>
        Console
      </span>
      <span id="log-count" style="color:var(--muted);font-size:0.7rem;"></span>
    </div>
    <div class="output-log" id="output-log">
      <div class="welcome">
        <div class="welcome-icon">⚡</div>
        <div style="color:var(--text);font-weight:600;font-size:1rem;">Ready to run</div>
        <div>Write some JavaScript and hit <kbd>Run</kbd></div>
        <div style="margin-top:0.25rem">or press <kbd>Cmd/Ctrl</kbd> + <kbd>Enter</kbd></div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-left">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">idle</span>
      </div>
      <div class="status-right">
        <span id="exec-time" class="exec-time"></span>
        <span style="color:var(--border)">v8</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── CodeMirror setup ──────────────────────────────────
const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
  lineNumbers: true,
  mode: 'javascript',
  theme: 'dracula',
  autoCloseBrackets: true,
  matchBrackets: true,
  indentUnit: 2,
  tabSize: 2,
  lineWrapping: true,
  extraKeys: {
    'Ctrl-Enter': runCode,
    'Cmd-Enter':  runCode,
  }
});

// Fix height inside flex
const editorWrap = document.getElementById('editor-wrap');
function resizeEditor() {
  const h = editorWrap.getBoundingClientRect().height;
  editor.setSize('100%', h + 'px');
}
new ResizeObserver(resizeEditor).observe(editorWrap);
resizeEditor();

// ── Value formatter ───────────────────────────────────
function formatValue(v) {
  if (v === null)      return '<span class="val-null">null</span>';
  if (v === undefined) return '<span class="val-null">undefined</span>';
  if (typeof v === 'string')  return `<span class="val-string">"${escHtml(v)}"</span>`;
  if (typeof v === 'number')  return `<span class="val-number">${v}</span>`;
  if (typeof v === 'boolean') return `<span class="val-boolean">${v}</span>`;
  if (typeof v === 'function') return `<span class="val-null">ƒ ${escHtml(v.name || 'anonymous')}()</span>`;
  try {
    const str = JSON.stringify(v, null, 2);
    return `<span class="val-object">${escHtml(str)}</span>`;
  } catch {
    return `<span class="val-object">[Object]</span>`;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function argsToHtml(args) {
  return args.map(a => {
    if (typeof a === 'string') return `<span class="val-string">${escHtml(a)}</span>`;
    return formatValue(a);
  }).join('<span style="color:var(--muted)"> </span>');
}

// ── Output helpers ────────────────────────────────────
const logEl      = document.getElementById('output-log');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const execTimeEl = document.getElementById('exec-time');
const logCount   = document.getElementById('log-count');
let   lineCount  = 0;

function appendLog(type, icon, html) {
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  entry.innerHTML = `<span class="log-icon">${icon}</span><span class="log-text">${html}</span>`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
  lineCount++;
  logCount.textContent = lineCount === 1 ? '1 entry' : `${lineCount} entries`;
}

function setStatus(state, text, time) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
  execTimeEl.textContent = time || '';
}

// ── Runner ────────────────────────────────────────────
function runCode() {
  const code = editor.getValue();
  if (!code.trim()) return;

  // Clear output
  logEl.innerHTML = '';
  lineCount = 0;
  logCount.textContent = '';
  setStatus('running', 'running…');

  // Intercept console methods
  const _console = {};
  const methods = {
    log:   { icon: '›', type: 'log' },
    warn:  { icon: '⚠', type: 'warn' },
    error: { icon: '✕', type: 'error' },
    info:  { icon: 'ℹ', type: 'info' },
  };

  for (const [name, { icon, type }] of Object.entries(methods)) {
    _console[name] = console[name].bind(console);
    console[name] = (...args) => {
      _console[name](...args); // still goes to devtools
      appendLog(type, icon, argsToHtml(args));
    };
  }

  const t0 = performance.now();

  try {
    const fn = new Function(code);
    fn();
    const ms = (performance.now() - t0).toFixed(2);
    setStatus('success', 'done', `${ms}ms`);
    if (lineCount === 0) {
      appendLog('system', '·', '<em>No output</em>');
    }
  } catch (err) {
    const ms = (performance.now() - t0).toFixed(2);
    setStatus('error', 'error', `${ms}ms`);
    appendLog('error', '✕', escHtml(err.toString()));
  } finally {
    // Restore console
    for (const name of Object.keys(methods)) {
      console[name] = _console[name];
    }
  }
}

// ── Buttons ───────────────────────────────────────────
document.getElementById('run-btn').addEventListener('click', runCode);

document.getElementById('clear-btn').addEventListener('click', () => {
  logEl.innerHTML = `
    <div class="welcome">
      <div class="welcome-icon">⚡</div>
      <div style="color:var(--text);font-weight:600;font-size:1rem;">Ready to run</div>
      <div>Write some JavaScript and hit <kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:0.1rem 0.4rem;font-family:var(--font-mono);font-size:0.75rem;color:var(--text)">Run</kbd></div>
    </div>`;
  lineCount = 0;
  logCount.textContent = '';
  setStatus('', 'idle');
  execTimeEl.textContent = '';
});

document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(editor.getValue()).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`; }, 1500);
  });
});

// ── Resize handle ─────────────────────────────────────
const handle = document.getElementById('resize-handle');
const workspace = document.getElementById('workspace');
const editorPanel = document.getElementById('editor-panel');
const outputPanel = document.getElementById('output-panel');
let dragging = false;

handle.addEventListener('mousedown', e => {
  dragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = workspace.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const total = rect.width - 4;
  const pct = Math.min(Math.max(x / total * 100, 20), 80);
  editorPanel.style.flex = 'none';
  editorPanel.style.width = pct + '%';
  outputPanel.style.flex = '1';
  outputPanel.style.width = 'auto';
  resizeEditor();
});

document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
</body>
</html>
